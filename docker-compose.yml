

services:
  postgres:
    image: postgres:15
    container_name: readmission_db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  ingestion:
    build: ./services/ingestion
    container_name: readmission_ingestion
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
  feature_engineering:
    build: ./services/feature_engineering
    depends_on:
      postgres:
        condition: service_healthy
      ingestion:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: "no"
  minio:
    image: minio/minio
    container_name: readmission_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}        
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD} 
    command: server /data --console-address ':9001'
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: readmission_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb local/${MINIO_BUCKET} --ignore-existing;
        echo 'Bucket ready!';
      "
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: readmission_mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT}         
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}              
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}      
    command: >
      bash -c "pip install psycopg2-binary boto3 --quiet &&
               mlflow server
                 --host 0.0.0.0
                 --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
                 --default-artifact-root s3://${MINIO_BUCKET}/"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  training:
    build: ./services/training
    container_name: readmission_training
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT}     
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}          
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}  
      MODEL_NAME: ${MODEL_NAME}
    depends_on:
      mlflow:
        condition: service_healthy
      feature_engineering:
        condition: service_completed_successfully
    restart: "no"
volumes:
  postgres_data:
  minio_data:
    