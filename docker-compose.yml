

services:
  postgres:
    image: postgres:15
    container_name: readmission_db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  ingestion:
    build: ./services/ingestion
    container_name: readmission_ingestion
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:  